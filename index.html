<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>リハビリ自主トレ</title>
<meta name="theme-color" content="#146E5A" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="自主トレ" />
<link rel="icon" href="icons/favicon-64.png" />
<style>
  :root{
    --bg:#F6F1E7;
    --surface:#FFFFFF;
    --ink:#2C2A24;
    --muted:#8E887A;
    --line:#EAE3D5;
    --primary:#157C64;
    --primary-d:#0F5E4C;
    --primary-soft:#D8ECE4;
    --accent:#E8763C;
    --gold:#E5B53A;
    --shadow:0 6px 22px rgba(40,35,25,.08);
    --shadow-lg:0 14px 40px rgba(40,35,25,.16);
    --r:20px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .app{
    max-width:560px;margin:0 auto;
    padding:calc(var(--safe-top) + 14px) 16px calc(var(--safe-bot) + 40px);
  }

  /* ---------- Header ---------- */
  header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .ring-wrap{position:relative;width:88px;height:88px;flex:none;}
  .ring-wrap svg{transform:rotate(-90deg);display:block;}
  .ring-bg{stroke:var(--line);}
  .ring-fg{stroke:var(--primary);stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1),stroke .4s;}
  .ring-pct{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .ring-pct b{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1;}
  .ring-pct small{font-size:10px;color:var(--muted);margin-top:2px;}
  .head-txt{flex:1;min-width:0;}
  .date-line{font-size:13px;color:var(--muted);font-weight:600;}
  .head-txt h1{margin:2px 0 6px;font-size:21px;font-weight:800;letter-spacing:-.3px;}
  .streak{
    display:inline-flex;align-items:center;gap:6px;
    background:#FFF3DC;color:#B07A12;border:1px solid #F2DEA8;
    padding:4px 10px;border-radius:999px;font-size:12.5px;font-weight:700;
  }
  .count-line{font-size:13px;color:var(--muted);font-weight:600;margin-top:6px;}
  .count-line b{color:var(--ink);}

  /* ---------- Section label ---------- */
  .sec{display:flex;align-items:center;gap:8px;margin:24px 4px 12px;}
  .sec span{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.4px;}
  .sec::after{content:"";flex:1;height:1px;background:var(--line);}

  /* ---------- Card ---------- */
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:16px 16px 18px;margin-bottom:12px;box-shadow:var(--shadow);
    transition:border-color .3s,box-shadow .3s,background .3s;position:relative;overflow:hidden;
  }
  .card.done{background:linear-gradient(180deg,#F3FAF6,#EAF6F0);border-color:#BFE3D5;}
  .card-top{display:flex;align-items:flex-start;gap:12px;}
  .ex-icon{
    width:44px;height:44px;border-radius:13px;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:23px;
    background:var(--primary-soft);
  }
  .card.done .ex-icon{background:#C7E8DA;}
  .ex-meta{flex:1;min-width:0;}
  .ex-name{font-size:16.5px;font-weight:800;letter-spacing:-.2px;}
  .ex-sub{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px;}
  .ex-check{
    width:26px;height:26px;border-radius:50%;flex:none;margin-top:3px;
    border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
    color:#fff;transition:.3s;
  }
  .card.done .ex-check{background:var(--primary);border-color:var(--primary);}
  .ex-check svg{width:14px;height:14px;opacity:0;transform:scale(.4);transition:.3s;}
  .card.done .ex-check svg{opacity:1;transform:scale(1);}

  /* slots / sets */
  .slots{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px;}
  .slot{
    flex:1 1 0;min-width:74px;
    border:2px solid var(--line);background:#fff;border-radius:14px;
    padding:11px 6px;text-align:center;cursor:pointer;
    transition:transform .12s,background .2s,border-color .2s,color .2s;
    user-select:none;
  }
  .slot:active{transform:scale(.94);}
  .slot .lbl{font-size:13px;font-weight:800;line-height:1.2;}
  .slot .sub{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:700;}
  .slot.on{background:var(--primary);border-color:var(--primary);color:#fff;}
  .slot.on .sub{color:rgba(255,255,255,.85);}

  /* dot sets (for many sets) */
  .sets-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;align-items:center;}
  .setdot{
    width:46px;height:46px;border-radius:50%;flex:none;
    border:2px solid var(--line);background:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;color:var(--muted);
    transition:transform .12s,background .2s,border-color .2s,color .2s;user-select:none;
  }
  .setdot:active{transform:scale(.9);}
  .setdot.on{background:var(--primary);border-color:var(--primary);color:#fff;}

  .timer-btn{
    margin-top:14px;width:100%;border:1.5px dashed #CFC7B5;background:#FCFAF4;
    border-radius:13px;padding:11px;font-size:14px;font-weight:800;color:var(--primary-d);
    display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  }
  .timer-btn:active{background:#F2EEE2;}

  /* ---------- footer reset ---------- */
  .foot{margin-top:26px;text-align:center;}
  .reset{
    background:none;border:none;color:var(--muted);font-size:13px;font-weight:700;
    text-decoration:underline;cursor:pointer;padding:8px;
  }
  .tip{font-size:12px;color:var(--muted);margin-top:14px;text-align:center;line-height:1.7;}

  /* ---------- Timer overlay ---------- */
  .overlay{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:center;justify-content:center;
    background:rgba(20,30,28,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    padding:24px;
  }
  .overlay.show{display:flex;}
  .timer-card{
    background:var(--surface);border-radius:28px;padding:26px 22px 24px;width:100%;max-width:340px;
    text-align:center;box-shadow:var(--shadow-lg);animation:pop .35s cubic-bezier(.2,1.2,.4,1);
  }
  @keyframes pop{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
  .timer-card h3{margin:0 0 2px;font-size:18px;font-weight:800;}
  .timer-card .tsub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:16px;}
  .tring-wrap{position:relative;width:200px;height:200px;margin:0 auto 18px;}
  .tring-wrap svg{transform:rotate(-90deg);}
  .tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:52px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
  .tnum.fin{color:var(--accent);font-size:30px;}
  .tbtns{display:flex;gap:10px;}
  .tbtn{
    flex:1;border:none;border-radius:15px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;
  }
  .tbtn.primary{background:var(--primary);color:#fff;}
  .tbtn.ghost{background:#F1ECE0;color:var(--ink);}
  .tbtn:active{transform:scale(.97);}

  /* ---------- Complete overlay ---------- */
  .complete{
    position:fixed;inset:0;z-index:60;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;
    background:radial-gradient(120% 80% at 50% 0%,#1C9277,#0E5544);color:#fff;
  }
  .complete.show{display:flex;animation:fade .4s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .complete .badge{
    width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;margin-bottom:22px;
    animation:badgePop .6s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes badgePop{0%{transform:scale(.3);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
  .complete .badge svg{width:64px;height:64px;}
  .complete h2{font-size:32px;font-weight:900;margin:0 0 8px;letter-spacing:.5px;}
  .complete p{font-size:15.5px;opacity:.92;margin:0 0 26px;font-weight:600;line-height:1.7;}
  .complete .cbtn{
    background:#fff;color:var(--primary-d);border:none;border-radius:16px;
    padding:15px 34px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:var(--shadow-lg);
  }
  .complete .cbtn:active{transform:scale(.97);}
  .confetti{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;opacity:.95;
    animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.4;}}

  .install-hint{
    background:#FFF7E8;border:1px solid #F2DEA8;border-radius:16px;
    padding:13px 14px;font-size:12.5px;color:#7a5a12;font-weight:600;line-height:1.7;
    margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;
  }
  .install-hint button{margin-left:auto;background:none;border:none;color:#b07a12;font-weight:800;cursor:pointer;font-size:18px;line-height:1;flex:none;}
</style>
</head>
<body>
<div class="app">
  <div id="installHint" class="install-hint" style="display:none">
    <span>📲</span>
    <span><b>ホーム画面に追加</b>すると、アプリのように毎日すぐ開けます。Safariの「共有」→「ホーム画面に追加」。</span>
    <button onclick="dismissHint()">×</button>
  </div>

  <header>
    <div class="ring-wrap">
      <svg width="88" height="88" viewBox="0 0 88 88">
        <circle class="ring-bg" cx="44" cy="44" r="38" fill="none" stroke-width="8"/>
        <circle id="ringFg" class="ring-fg" cx="44" cy="44" r="38" fill="none" stroke-width="8"
                stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
      </svg>
      <div class="ring-pct"><b id="ringPct">0%</b><small>達成</small></div>
    </div>
    <div class="head-txt">
      <div class="date-line" id="dateLine">—</div>
      <h1>今日の自主トレ</h1>
      <span class="streak" id="streak">🔥 連続 0 日</span>
      <div class="count-line"><b id="doneCount">0</b> / <span id="totalCount">0</span> 項目 完了</div>
    </div>
  </header>

  <div id="list"></div>

  <div class="foot">
    <button class="reset" onclick="resetToday()">今日の記録をリセット</button>
    <div class="tip">タップするだけで記録できます。<br>日付が変わると自動で新しい一日が始まります。</div>
  </div>
</div>

<!-- Timer overlay -->
<div class="overlay" id="timerOverlay">
  <div class="timer-card">
    <h3 id="tTitle">タイマー</h3>
    <div class="tsub" id="tSub"></div>
    <div class="tring-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="88" fill="none" stroke="#EAE3D5" stroke-width="12"/>
        <circle id="tRing" cx="100" cy="100" r="88" fill="none" stroke="#157C64" stroke-width="12"
                stroke-linecap="round" stroke-dasharray="552.92" stroke-dashoffset="0"/>
      </svg>
      <div class="tnum" id="tNum">0</div>
    </div>
    <div class="tbtns">
      <button class="tbtn ghost" onclick="closeTimer()">閉じる</button>
      <button class="tbtn primary" id="tToggle" onclick="toggleTimer()">スタート</button>
    </div>
  </div>
</div>

<!-- Complete overlay -->
<div class="complete" id="complete">
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
  </div>
  <h2>コンプリート！</h2>
  <p id="completeMsg">今日のメニューを全部やりきりました。<br>本当にお疲れさまでした！</p>
  <button class="cbtn" onclick="hideComplete()">とじる</button>
</div>

<script>
/* ===== トレーニング定義 ===== */
const EXERCISES = [
  {id:'stand',  name:'1分立つ',            type:'meal', icon:'🧍', sub:'毎食後・1分間',     timer:60},
  {id:'laps',   name:'病棟3周',            type:'meal', icon:'♿', sub:'毎食後・車椅子で3周'},
  {id:'ankleUD',name:'右足首の上げ下げ',    type:'sets', icon:'🦶', sets:2, rep:'20回'},
  {id:'ankleTW',name:'右足首のタオル運動',  type:'sets', icon:'🦶', sets:5, rep:'10秒キープ', timer:10},
  {id:'rLeg',   name:'右足の足上げ運動',    type:'sets', icon:'🦵', sets:3, rep:'10回'},
  {id:'lLeg',   name:'左足の足上げ運動',    type:'sets', icon:'🦵', sets:3, rep:'10回'},
  {id:'push',   name:'車椅子プッシュアップ',type:'sets', icon:'💪', sets:3, rep:'10回'},
  {id:'rGrip',  name:'右手のタオルにぎり',  type:'sets', icon:'✊', sets:2, rep:'10回'},
  {id:'lGrip',  name:'左手のタオルにぎり',  type:'sets', icon:'✊', sets:2, rep:'10回'},
];
const MEALS = [['m','朝'],['n','昼'],['e','夜']];

/* ===== 状態管理 ===== */
const STORE='rehab-data-v1';
function loadAll(){ try{return JSON.parse(localStorage.getItem(STORE))||{};}catch(e){return {};} }
function saveAll(d){ try{localStorage.setItem(STORE,JSON.stringify(d));}catch(e){} }
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function blankDay(){
  const day={};
  EXERCISES.forEach(ex=>{
    if(ex.type==='meal') day[ex.id]={m:false,n:false,e:false};
    else day[ex.id]=new Array(ex.sets).fill(false);
  });
  return day;
}
let DATA=loadAll();
const TKEY=todayKey();
if(!DATA[TKEY]) DATA[TKEY]=blankDay();
let day=DATA[TKEY];

/* 合計ユニット数 */
const TOTAL=EXERCISES.reduce((s,ex)=>s+(ex.type==='meal'?3:ex.sets),0);

/* ===== 描画 ===== */
const listEl=document.getElementById('list');
function exDone(ex){
  if(ex.type==='meal') return MEALS.every(([k])=>day[ex.id][k]);
  return day[ex.id].every(Boolean);
}
function countDone(){
  let c=0;
  EXERCISES.forEach(ex=>{
    if(ex.type==='meal') c+=MEALS.filter(([k])=>day[ex.id][k]).length;
    else c+=day[ex.id].filter(Boolean).length;
  });
  return c;
}

function render(){
  // セクション分け
  let html='<div class="sec"><span>毎食後（朝・昼・夜）</span></div>';
  EXERCISES.filter(e=>e.type==='meal').forEach(ex=>html+=cardHTML(ex));
  html+='<div class="sec"><span>セットでおこなう運動</span></div>';
  EXERCISES.filter(e=>e.type==='sets').forEach(ex=>html+=cardHTML(ex));
  listEl.innerHTML=html;
  bind();
  updateProgress();
}

function cardHTML(ex){
  const done=exDone(ex);
  let inner='';
  if(ex.type==='meal'){
    inner='<div class="slots">'+MEALS.map(([k,label])=>{
      const on=day[ex.id][k];
      return `<div class="slot ${on?'on':''}" data-ex="${ex.id}" data-meal="${k}">
        <div class="lbl">${label}</div><div class="sub">${on?'完了':'タップ'}</div></div>`;
    }).join('')+'</div>';
  } else {
    inner='<div class="sets-row">'+day[ex.id].map((on,i)=>
      `<div class="setdot ${on?'on':''}" data-ex="${ex.id}" data-set="${i}">${i+1}</div>`
    ).join('')+`<span style="font-size:12.5px;color:var(--muted);font-weight:700;margin-left:2px;">${ex.rep} × ${ex.sets}セット</span></div>`;
  }
  let timer='';
  if(ex.timer){
    const lbl=ex.timer>=60?(ex.timer/60)+'分':ex.timer+'秒';
    timer=`<div class="timer-btn" data-timer="${ex.id}">⏱ タイマー（${lbl}）</div>`;
  }
  const sub = ex.type==='meal' ? ex.sub : (ex.rep+' × '+ex.sets+'セット');
  return `<div class="card ${done?'done':''}" id="card-${ex.id}">
    <div class="card-top">
      <div class="ex-icon">${ex.icon}</div>
      <div class="ex-meta"><div class="ex-name">${ex.name}</div><div class="ex-sub">${sub}</div></div>
      <div class="ex-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
    </div>
    ${inner}${timer}
  </div>`;
}

function bind(){
  document.querySelectorAll('.slot').forEach(el=>el.onclick=()=>{
    const {ex,meal}=el.dataset; day[ex][meal]=!day[ex][meal]; commit(ex);
  });
  document.querySelectorAll('.setdot').forEach(el=>el.onclick=()=>{
    const i=+el.dataset.set; const ex=el.dataset.ex; day[ex][i]=!day[ex][i]; commit(ex);
  });
  document.querySelectorAll('[data-timer]').forEach(el=>el.onclick=()=>openTimer(el.dataset.timer));
}

let wasComplete=false;
function commit(exId){
  persist();
  // カードの見た目だけ更新（再描画は最小限）
  const ex=EXERCISES.find(e=>e.id===exId);
  const card=document.getElementById('card-'+exId);
  const done=exDone(ex);
  card.classList.toggle('done',done);
  if(ex.type==='meal'){
    card.querySelectorAll('.slot').forEach(s=>{
      const on=day[exId][s.dataset.meal];
      s.classList.toggle('on',on);
      s.querySelector('.sub').textContent=on?'完了':'タップ';
    });
  }else{
    card.querySelectorAll('.setdot').forEach(s=>{
      s.classList.toggle('on',day[exId][+s.dataset.set]);
    });
  }
  updateProgress();
}

function persist(){ DATA[TKEY]=day; saveAll(DATA); }

const RING_LEN=238.76;
function updateProgress(){
  const c=countDone();
  const pct=Math.round(c/TOTAL*100);
  document.getElementById('ringFg').style.strokeDashoffset=RING_LEN*(1-c/TOTAL);
  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('doneCount').textContent=c;
  document.getElementById('totalCount').textContent=TOTAL;
  document.getElementById('ringFg').style.stroke = c===TOTAL ? 'var(--accent)' : 'var(--primary)';
  updateStreak();
  // コンプリート判定
  if(c===TOTAL && !wasComplete){ wasComplete=true; showComplete(); }
  if(c<TOTAL) wasComplete=false;
}

function isDayComplete(d){
  if(!d) return false;
  return EXERCISES.every(ex=> ex.type==='meal'
    ? MEALS.every(([k])=>d[ex.id]&&d[ex.id][k])
    : (d[ex.id]||[]).every(Boolean) && (d[ex.id]||[]).length===ex.sets);
}
function updateStreak(){
  // 今日から遡って連続コンプリート日数
  let streak=0; const dt=new Date();
  for(let i=0;i<400;i++){
    const k=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    if(isDayComplete(DATA[k])) streak++;
    else if(i>0) break;           // 今日が未完了でも昨日までの連続は数える
    else { /* 今日未完了→続行して昨日以前を数える */ }
    dt.setDate(dt.getDate()-1);
  }
  document.getElementById('streak').textContent='🔥 連続 '+streak+' 日';
}

function resetToday(){
  if(!confirm('今日の記録をすべて消して、最初からやり直しますか？')) return;
  day=blankDay(); DATA[TKEY]=day; saveAll(DATA); wasComplete=false; render();
}

/* ===== コンプリート演出 ===== */
function showComplete(){
  const el=document.getElementById('complete');
  el.classList.add('show');
  if(navigator.vibrate) navigator.vibrate([60,40,60,40,120]);
  // 紙吹雪
  const colors=['#E5B53A','#E8763C','#157C64','#7FCBB3','#fff'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(1.6+Math.random()*1.4)+'s';
    c.style.animationDelay=(Math.random()*.4)+'s';
    el.appendChild(c);
    setTimeout(()=>c.remove(),3600);
  }
}
function hideComplete(){ document.getElementById('complete').classList.remove('show'); }

/* ===== タイマー ===== */
let tTotal=0,tLeft=0,tInt=null,tRunning=false;
const TRING=552.92;
function openTimer(exId){
  const ex=EXERCISES.find(e=>e.id===exId);
  tTotal=tLeft=ex.timer; tRunning=false; clearInterval(tInt);
  document.getElementById('tTitle').textContent=ex.name;
  document.getElementById('tSub').textContent = ex.timer>=60?(ex.timer/60)+'分間キープ':ex.timer+'秒間キープ';
  document.getElementById('tToggle').textContent='スタート';
  paintTimer();
  document.getElementById('timerOverlay').classList.add('show');
}
function paintTimer(){
  const num=document.getElementById('tNum');
  if(tLeft<=0){ num.textContent='おわり！'; num.classList.add('fin'); }
  else{
    num.classList.remove('fin');
    num.textContent = tTotal>=60
      ? Math.floor(tLeft/60)+':'+String(tLeft%60).padStart(2,'0')
      : tLeft;
  }
  const frac = tTotal? tLeft/tTotal : 0;
  document.getElementById('tRing').style.strokeDashoffset = TRING*(1-frac);
}
function toggleTimer(){
  if(tLeft<=0){ tLeft=tTotal; paintTimer(); }
  if(tRunning){ tRunning=false; clearInterval(tInt); document.getElementById('tToggle').textContent='再開'; return; }
  tRunning=true; document.getElementById('tToggle').textContent='一時停止';
  const start=Date.now(), base=tLeft;
  tInt=setInterval(()=>{
    const el=Math.floor((Date.now()-start)/1000);
    tLeft=Math.max(0,base-el); paintTimer();
    if(tLeft<=0){
      clearInterval(tInt); tRunning=false;
      document.getElementById('tToggle').textContent='もう一度';
      if(navigator.vibrate) navigator.vibrate([120,60,120]);
    }
  },200);
}
function closeTimer(){ clearInterval(tInt); tRunning=false; document.getElementById('timerOverlay').classList.remove('show'); }

/* ===== 日付・初期化 ===== */
function setDateLine(){
  const d=new Date(); const w=['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('dateLine').textContent=`${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}
function dismissHint(){ document.getElementById('installHint').style.display='none'; localStorage.setItem('hideHint','1'); }
// iOS Safari（ホーム画面未追加）のときだけ案内
(function(){
  const standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS && !standalone && !localStorage.getItem('hideHint')){
    document.getElementById('installHint').style.display='flex';
  }
})();

setDateLine();
wasComplete = (countDone()===TOTAL);   // 既に完了済みの日を開いただけでは演出を出さない
render();

// 日付が変わったら自動更新（アプリを開きっぱなしでも）
setInterval(()=>{ if(todayKey()!==TKEY) location.reload(); }, 60000);

// Service Worker 登録（オフライン対応）
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
